<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SureThing Artifacts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    header { margin-bottom: 40px; }
    header h1 { font-size: 1.8rem; font-weight: 600; color: #f0f6fc; }
    header p { margin-top: 8px; color: #8b949e; font-size: 0.95rem; }
    .section { margin-bottom: 32px; }
    .section-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #21262d; }
    .card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: #161b22; border: 1px solid #21262d; border-radius: 8px; margin-bottom: 8px; text-decoration: none; color: inherit; transition: border-color 0.15s, background 0.15s; }
    .card:hover { border-color: #58a6ff; background: #1c2128; }
    .card-icon { font-size: 1.4rem; flex-shrink: 0; }
    .card-body { flex: 1; }
    .card-title { font-size: 0.95rem; font-weight: 500; color: #f0f6fc; }
    .card-meta { font-size: 0.8rem; color: #8b949e; margin-top: 2px; }
    .card-arrow { color: #8b949e; font-size: 0.9rem; }
    footer { margin-top: 60px; font-size: 0.8rem; color: #484f58; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SureThing Artifacts</h1>
      <p>Generated files and visualizations — permanent links, no expiry.</p>
    </header>

    <div class="section">
      <div class="section-title">GitHub</div>

      <a class="card" href="github/knowledge-graph.html">
        <span class="card-icon">🕸️</span>
        <div class="card-body">
          <div class="card-title">GitHub Starred Repos — Knowledge Graph</div>
          <div class="card-meta">Interactive Cytoscape.js graph · repos, languages, topics</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <footer>Updated automatically by SureThing · <a href="https://github.com/organized-thot/surething-artifacts" style="color:#58a6ff;">source</a></footer>
  </div>
</body>
</html>
