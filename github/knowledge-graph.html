", "type": "topic"}], "stats": {"total_repos": 800, "top_languages": [["Python", 157], ["TypeScript", 121], ["JavaScript", 112], ["Go", 35], ["HTML", 31], ["Rust", 20], ["Shell", 17], ["Jupyter Notebook", 16], ["Nix", 15], ["CSS", 13]], "top_topics": [["ai", 72], ["obsidian", 46], ["llm", 40], ["python", 32], ["awesome-list", 28], ["hacktoberfest", 27], ["chatgpt", 27], ["openai", 27], ["obsidian-md", 27], ["self-hosted", 23], ["awesome", 22], ["cli", 20], ["chrome-extension", 20], ["browser-extension", 20], ["obsidian-plugin", 19]]}};
  const allNodes = RAW.nodes;
  const allEdges = RAW.edges;
  const stats = RAW.stats;

  document.getElementById('s-repos').textContent = stats.total_repos.toLocaleString();
  document.getElementById('s-nodes').textContent = allNodes.length.toLocaleString();
  document.getElementById('s-edges').textContent = allEdges.length.toLocaleString();

  function nodeColor(n) {
    if (n.type === 'language') return '#f78166';
    if (n.type === 'topic') return '#3fb950';
    return '#58a6ff';
  }
  function nodeSize(n) {
    if (n.type === 'language') return 6 + Math.min((n.count || 1) / 8, 14);
    if (n.type === 'topic') return 5 + Math.min((n.count || 1) / 6, 12);
    return 3;
  }

  function makeBars(containerId, items, maxVal, color) {
    const el = document.getElementById(containerId);
    items.forEach(([label, count]) => {
      const pct = Math.round((count / maxVal) * 100);
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = '<div class="bar-label" title="' + label + '">' + label + '</div>'
        + '<div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>'
        + '<div class="bar-count">' + count + '</div>';
      el.appendChild(row);
    });
  }

  makeBars('lang-bars', stats.top_languages, stats.top_languages[0][1], '#f78166');
  makeBars('topic-bars', stats.top_topics, stats.top_topics[0][1], '#3fb950');

  document.getElementById('toggle-sidebar').addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
  });

  const graphData = {
    nodes: allNodes.map(function(n) {
      return Object.assign({}, n, { color: nodeColor(n), val: nodeSize(n) });
    }),
    links: allEdges.map(function(e) {
      return { source: e.source, target: e.target, color: e.type === 'language' ? 'rgba(247,129,102,0.15)' : 'rgba(63,185,80,0.1)' };
    })
  };

  var highlightNodes = new Set();
  var tooltip = document.getElementById('tooltip');

  var Graph = ForceGraph()(document.getElementById('graph'))
    .graphData(graphData)
    .nodeId('id')
    .nodeLabel(function() { return ''; })
    .nodeColor(function(n) {
      if (highlightNodes.size > 0) {
        return highlightNodes.has(n.id) ? nodeColor(n) : '#21262d';
      }
      return nodeColor(n);
    })
    .nodeVal(function(n) { return nodeSize(n); })
    .linkColor(function(l) { return l.color; })
    .linkWidth(0.4)
    .backgroundColor('#0d1117')
    .onNodeHover(function(node) {
      if (!node) { tooltip.style.display = 'none'; return; }
      tooltip.style.display = 'block';
      if (node.type === 'repo') {
        tooltip.innerHTML = '<div class="tt-name">' + (node.full_name || node.label) + '</div>'
          + '<div class="tt-desc">' + (node.description || '—') + '</div>'
          + '<div class="tt-meta">⭐ ' + (node.stars || 0).toLocaleString() + '  🏷 ' + (node.language || 'n/a') + '</div>';
      } else if (node.type === 'language') {
        tooltip.innerHTML = '<div class="tt-name">🔵 ' + node.label + '</div><div class="tt-meta">' + node.count + ' repos use this language</div>';
      } else {
        tooltip.innerHTML = '<div class="tt-name">🏷 ' + node.label + '</div><div class="tt-meta">' + node.count + ' repos tagged with this topic</div>';
      }
    })
    .onNodeClick(function(node) {
      if (node.url) window.open(node.url, '_blank');
    })
    .d3AlphaDecay(0.015)
    .d3VelocityDecay(0.3);

  Graph.d3Force('charge').strength(function(n) {
    return n.type === 'repo' ? -25 : -90;
  });

  document.addEventListener('mousemove', function(e) {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  document.getElementById('search').addEventListener('input', function(e) {
    var q = e.target.value.toLowerCase().trim();
    highlightNodes.clear();
    if (q) {
      graphData.nodes.forEach(function(n) {
        if ((n.label || '').toLowerCase().includes(q) || (n.full_name || '').toLowerCase().includes(q)) {
          highlightNodes.add(n.id);
        }
      });
    }
    Graph.nodeColor(function(n) {
      if (highlightNodes.size > 0) return highlightNodes.has(n.id) ? nodeColor(n) : '#21262d';
      return nodeColor(n);
    });
  });

} catch(err) {
  document.getElementById('graph').innerHTML = '<div style="color:#f78166;padding:40px;font-size:14px">Error loading graph: ' + err.message + '</div>';
  console.error(err);
}
</script>
